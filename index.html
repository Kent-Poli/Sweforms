<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Sweforms</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif
      margin: 0
      padding: 0
      background: #f5f5f5
      color: #222222
    }
    .wrapper {
      max-width: 960px
      margin: 0 auto
      padding: 24px
    }
    header {
      margin-bottom: 24px
    }
    h1 {
      font-size: 28px
      margin-bottom: 8px
    }
    h2 {
      font-size: 20px
      margin-top: 24px
      margin-bottom: 8px
    }
    p {
      line-height: 1.5
      margin-bottom: 8px
    }
    .card {
      background: #ffffff
      border-radius: 8px
      padding: 20px
      box-shadow: 0 2px 6px rgba(0,0,0,0.06)
    }
    footer {
      margin-top: 32px
      font-size: 14px
      color: #777777
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>Sweforms</h1>
      <p>Enkel sida kopplad till min domän och GitHub Pages.</p>
    </header>
<main>
  <div class="card">
    <h2>Välkommen</h2>
    <p>Här bygger jag vidare på Sweforms.</p>
    <p>Snart fyller jag på med fler sidor och tjänster.</p>
  </div>
</main>

<footer>
  <p>© <span id="year"></span> Sweforms</p>
</footer>
  </div>
  <script>
    const yearSpan = document.getElementById("year")
    yearSpan.textContent = new Date().getFullYear()
  </script>
</body>
</html>
